<!DOCTYPE html>
<html lang="en">
<head>
    <title>signup.com</title>

    <style>

        body{
            background-color: black;
            color: white;
        }

        .div1{
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;

        }
        .inner{
            height: 460px;
            width: 360px;
            background-image: url("bg3.webp");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
            margin-left: 20px;
            border-radius: 20px;
        }
        .inner h1{
            color: white;
            text-align: center;
            align-items: center;
        }
        .inner:hover{
            height: 465px;
            width: 365px;
        }

        .inner .name{
            height: 40px;
            width: 270px;
            border-radius:15px;
            border: 2px solid black;
            text-align: center;
            align-items: center;
            display: block;
            margin-top: 20px;
            font-size: 25px;
            font-weight: bold;
            margin-left: 40px;
        }
        .name:hover{
            height: 44px;
            width: 280px;
            background-color: black;
            color: white;
            border: 2px solid white;
            border-radius: 15px;
        }
        .button{
            height: 60px;
            width: 250px;
            margin-top: 100px;
            border: 2px solid white;
            border-radius: 15px;
            font-size: 30px;
            font-weight: bold;
            color: white; 
            background-color: black;
            margin-left: 55px;
        }

        
    @media (max-width:768px){

    .inner{
        max-width:350px;
    }

    .button{
        font-size:20px;
    }
}

/* Mobile */

@media (max-width:480px){

    body{
        padding:15px;
    }

    .inner{
        padding:25px;
    }

    .inner h1{
        font-size:28px;
    }

    .name{
        height:45px;
        font-size:16px;
    }

    .button{
        height:45px;
        font-size:18px;
    }
}
@media (max-width:350px){

    body{
        padding:15px;
    }

    .inner{
        padding:25px;
    }

    .inner h1{
        font-size:28px;
    }

    .name{
        height:45px;
        font-size:16px;
    }

    .button{
        height:45px;
        font-size:18px;
    }
}

    </style>
<link rel="stylesheet" href="project.html">
</head>

<body>
    <main>

        
        <form action="/project.html">

            
            <div class="div1">
            <div class="inner">
                <h1>Sign-Up</h1>
                <input type="text" class="name" placeholder="Name" required>
                <input type="email" class="name" placeholder="Email" required>
                <input type="password" class="name" placeholder="Password" required>
                <button class="button">ENTER</button>
                
            </div>
        </div>
    </form>
    </main>
</body>
</html>
